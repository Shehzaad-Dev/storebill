name: storebill
description: StoreBill — offline shopkeeper invoices, receipts, and business cards.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  flutter_colorpicker: ^1.1.0
  uuid: ^4.5.1
  collection: ^1.19.0
  crypto: ^3.0.6
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
